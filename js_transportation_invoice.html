<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Transportation – Invoice</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0c;
    --paper: #f5f0e8;
    --asphalt: #1c1c1c;
    --amber: #e8a020;
    --rust: #c84b1f;
    --stripe: #e9e4db;
    --muted: #7a7165;
    --border: #c8bfaf;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #d4cfc6;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    padding: 40px 20px;
    min-height: 100vh;
  }

  .page {
    background: var(--paper);
    max-width: 820px;
    margin: 0 auto;
    border: 2px solid var(--ink);
    box-shadow: 8px 8px 0 var(--asphalt);
    position: relative;
    overflow: hidden;
  }

  .page::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 6px;
    height: 100%;
    background: repeating-linear-gradient(
      180deg,
      var(--amber) 0, var(--amber) 14px,
      var(--ink) 14px, var(--ink) 28px
    );
  }

  /* ── HEADER ── */
  .header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    padding: 36px 52px 28px 40px;
    border-bottom: 2px solid var(--ink);
    gap: 20px;
  }

  .brand { display: flex; flex-direction: column; gap: 4px; }

  .truck-icon { font-size: 28px; line-height: 1; margin-bottom: 4px; }

  .company-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 2px;
    line-height: 0.9;
  }
  .company-name span { color: var(--rust); }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  .invoice-badge { text-align: right; }

  .invoice-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 3px;
    color: var(--asphalt);
    line-height: 1;
  }

  .invoice-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.8;
  }
  .invoice-meta label { color: var(--ink); font-weight: 500; }

  input[type="text"], input[type="number"], input[type="date"] {
    background: transparent;
    border: none;
    border-bottom: 1.5px dashed var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink);
    outline: none;
    padding: 2px 4px;
    width: 140px;
    transition: border-color 0.2s;
  }
  input:focus {
    border-bottom-color: var(--amber);
    background: rgba(232,160,32,0.06);
  }

  /* ── PARTIES ── */
  .parties {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    border-bottom: 2px solid var(--ink);
  }
  .party { padding: 24px 40px; }
  .party:last-child { padding-left: 36px; }
  .divider-v { background: var(--ink); width: 1px; }

  .party-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .party-field { display: flex; flex-direction: column; gap: 6px; }

  .field-row { display: flex; align-items: baseline; gap: 8px; }
  .field-row label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    min-width: 52px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .field-row input { flex: 1; min-width: 0; width: 100%; }

  /* ── SERVICE TABLE ── */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--muted);
    padding: 14px 40px 0;
    text-transform: uppercase;
  }

  table {
    width: calc(100% - 80px);
    margin: 12px 40px 0;
    border-collapse: collapse;
  }

  thead tr { background: var(--asphalt); color: var(--paper); }
  thead th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 12px;
    text-align: left;
    font-weight: 500;
  }
  thead th:last-child { text-align: right; }

  tbody tr { border-bottom: 1px solid var(--stripe); transition: background 0.15s; }
  tbody tr:nth-child(even) { background: var(--stripe); }
  tbody tr:hover { background: rgba(232,160,32,0.1); }

  tbody td {
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    vertical-align: middle;
  }
  tbody td:last-child { text-align: right; }
  tbody td input { width: 100%; font-size: 11px; padding: 1px 4px; }
  td input[type="number"] { width: 80px; }
  td.desc input { width: 100%; }
  td.total-cell { font-weight: 500; color: var(--rust); font-size: 12px; }

  .add-row-btn {
    display: block;
    margin: 10px 40px;
    background: none;
    border: 1.5px dashed var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-row-btn:hover {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(232,160,32,0.05);
  }

  /* ── TOTALS ── */
  .totals-area {
    display: grid;
    grid-template-columns: 1fr auto;
    margin: 0 40px 0;
    border-top: 2px solid var(--ink);
    padding-top: 12px;
    gap: 0 40px;
  }

  .notes-box { padding-right: 20px; }
  .notes-box label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
  }
  .notes-box textarea {
    width: 100%;
    min-height: 80px;
    background: transparent;
    border: 1.5px dashed var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--ink);
    padding: 8px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .notes-box textarea:focus { border-color: var(--amber); }

  .totals-table { min-width: 240px; }
  .totals-table .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    border-bottom: 1px solid var(--stripe);
    gap: 24px;
  }
  .totals-table .row label {
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 10px;
  }
  .totals-table .row span { font-weight: 500; }

  .totals-table .row.grand {
    border-top: 2px solid var(--ink);
    border-bottom: none;
    padding-top: 10px;
    margin-top: 4px;
  }
  .totals-table .row.grand label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--ink);
  }
  .totals-table .row.grand span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--rust);
    letter-spacing: 1px;
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 24px;
    border-top: 2px solid var(--ink);
    padding: 16px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .payment-terms {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .payment-terms strong {
    color: var(--ink);
    text-transform: uppercase;
    display: block;
    letter-spacing: 2px;
    margin-bottom: 2px;
  }

  .print-btn {
    background: var(--asphalt);
    color: var(--paper);
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 3px;
    padding: 10px 28px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .print-btn:hover { background: var(--rust); transform: translateY(-1px); }
  .print-btn:active { transform: translateY(0); }

  .road-strip {
    height: 8px;
    background: repeating-linear-gradient(
      90deg,
      var(--amber) 0, var(--amber) 40px,
      var(--ink) 40px, var(--ink) 80px
    );
  }

  @media print {
    body { background: white; padding: 0; }
    .page { box-shadow: none; border: none; max-width: 100%; }
    .page::before { display: none; }
    .print-btn { display: none; }
    .add-row-btn { display: none; }
    input, textarea { border-bottom-color: transparent !important; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="road-strip"></div>

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="truck-icon">🚚</div>
      <div class="company-name"><span>JS</span> TRANSPORTATION</div>
      <div class="tagline">Box Truck Hauling &amp; Freight Services</div>
    </div>
    <div class="invoice-badge">
      <div class="invoice-label">INVOICE</div>
      <div class="invoice-meta">
        <div><label>Invoice #</label> &nbsp;<input type="text" id="inv-num" placeholder="INV-0001" style="width:110px"></div>
        <div><label>Date &nbsp;&nbsp;&nbsp;&nbsp;</label> &nbsp;<input type="date" id="inv-date"></div>
        <div><label>Due &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label> &nbsp;<input type="date" id="inv-due"></div>
      </div>
    </div>
  </div>

  <!-- PARTIES -->
  <div class="parties">
    <div class="party">
      <div class="party-label">From</div>
      <div class="party-field">
        <div class="field-row"><label>Name</label><input type="text" value="JS Transportation" readonly style="color:var(--muted)"></div>
        <div class="field-row"><label>Phone</label><input type="text" placeholder="(555) 000-0000"></div>
      </div>
    </div>
    <div class="divider-v"></div>
    <div class="party">
      <div class="party-label">Bill To</div>
      <div class="party-field">
        <div class="field-row"><label>Name</label><input type="text" placeholder="Client / Company"></div>
        <div class="field-row"><label>Phone</label><input type="text" placeholder="(555) 000-0000"></div>
      </div>
    </div>
  </div>

  <!-- SERVICE TABLE -->
  <div class="section-title">Services</div>
  <table id="services-table">
    <thead>
      <tr>
        <th style="width:120px">Date</th>
        <th>Description</th>
        <th style="width:90px">Miles</th>
        <th style="width:90px">$/Mile</th>
        <th style="width:70px">Hrs <span style="font-size:8px;opacity:0.6">(opt)</span></th>
        <th style="width:70px">$/Hr <span style="font-size:8px;opacity:0.6">(opt)</span></th>
        <th style="width:90px">Total</th>
      </tr>
    </thead>
    <tbody id="rows-body"></tbody>
  </table>

  <button class="add-row-btn" onclick="addRow()">+ Add Line</button>

  <!-- TOTALS + NOTES -->
  <div class="totals-area">
    <div class="notes-box">
      <label>Notes / Special Instructions</label>
      <textarea placeholder="Payment terms, special conditions, thank-you note..."></textarea>
    </div>
    <div class="totals-table">
      <div class="row grand">
        <label>Total Due</label>
        <span id="grand-total">$0.00</span>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="payment-terms">
      <strong>Payment Terms</strong>
      Make checks payable to JS Transportation<br>
      or transfer via Zelle / CashApp / Wire
    </div>
    <button class="print-btn" onclick="window.print()">🖨 Print / Save PDF</button>
  </div>

  <div class="road-strip"></div>
</div>

<script>
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('inv-date').value = today;
  const due = new Date(); due.setDate(due.getDate() + 30);
  document.getElementById('inv-due').value = due.toISOString().split('T')[0];
  document.getElementById('inv-num').value = 'INV-' + String(Math.floor(Math.random()*900)+100);

  function addRow(date='', desc='', miles='', rateM='', hrs='', rateH='') {
    const tbody = document.getElementById('rows-body');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="date" class="r-date" value="${date}"></td>
      <td class="desc"><input type="text" class="r-desc" placeholder="e.g. Delivery run – Miami to Orlando" value="${desc}"></td>
      <td><input type="number" class="r-miles" placeholder="0" min="0" step="0.1" value="${miles}"></td>
      <td><input type="number" class="r-ratem" placeholder="0.00" min="0" step="0.01" value="${rateM}"></td>
      <td><input type="number" class="r-hrs" placeholder="—" min="0" step="0.5" value="${hrs}" title="Optional"></td>
      <td><input type="number" class="r-rateh" placeholder="—" min="0" step="0.01" value="${rateH}" title="Optional hourly rate"></td>
      <td class="total-cell r-line-total">$0.00</td>
    `;
    tbody.appendChild(tr);
    tr.querySelectorAll('input').forEach(i => i.addEventListener('input', recalc));
    recalc();
  }

  function recalc() {
    let total = 0;
    document.querySelectorAll('#rows-body tr').forEach(tr => {
      const miles = parseFloat(tr.querySelector('.r-miles')?.value) || 0;
      const rateM = parseFloat(tr.querySelector('.r-ratem')?.value) || 0;
      const hrs   = parseFloat(tr.querySelector('.r-hrs')?.value)   || 0;
      const rateH = parseFloat(tr.querySelector('.r-rateh')?.value) || 0;
      const line  = miles * rateM + hrs * rateH;
      tr.querySelector('.r-line-total').textContent = '$' + line.toFixed(2);
      total += line;
    });
    document.getElementById('grand-total').textContent = '$' + total.toFixed(2);
  }

  // One blank starter row
  addRow(today, '', '', '', '', '');
</script>
</body>
</html>
